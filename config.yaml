llm:
  engine: "ollama"            # "ollama", "openclaw", "openai", "copilot"

  ollama:
    url: "http://127.0.0.1:11434"
    model: "qwen3.5:9b"

  openclaw:
    url: "http://127.0.0.1:18789"
    api_key: ""
    model: "default"

  openai:
    api_key: ""               # sk-... (OpenAI API 키)
    model: "gpt-4o"

  copilot:
    model: "gpt-4o"           # Copilot에서 사용할 모델
    # oauth_token: ""         # 직접 지정 시 (미지정이면 로컬 VS Code 토큰 자동 탐색)

tts:
  engine: "edge-tts"
  sample_rate: 24000

  kokoro:
    voice: "af_heart"
    lang_code: "k"

  edge_tts:
    voice: "ko-KR-SunHiNeural"

stt:
  model_size: "base"
  language: "ko"
  device: "cpu"

lipsync:
  method: "rhubarb"
  rhubarb_path: "/usr/local/bin/rhubarb"

avatar:
  vrm_path: "models/avatar.vrm"

server:
  host: "0.0.0.0"
  port: 8000
  cors_origins:
    - "http://localhost:5173"
